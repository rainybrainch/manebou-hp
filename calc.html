<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネぼうアプリ | マネぼう塾</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>

/* ─── Variables ──────────────────────────────────────────── */
:root {
  --sky:       #5BC8E8;
  --red:       #E8354A;
  --gold:      #F5C842;
  --gold-dark: #D4A017;
  --green:     #4CAF7D;
  --purple:    #9B6DD6;
  --dark:      #1A1A2E;
  --white:     #FFFFFF;
  --cream:     #FFFDF5;
}

/* ─── Reset & Base ───────────────────────────────────────── */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #0a0a1e;
  color: var(--white);
  min-height: 100vh;
  padding-bottom: 70px;
}

/* ─── Animation ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Nav ────────────────────────────────────────────────── */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(26, 26, 46, 0.96);
  backdrop-filter: blur(16px);
  border-bottom: 3px solid var(--gold);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-back {
  color: rgba(255, 255, 255, 0.7);
  font-size: 12px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--gold); }

.nav-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px;
  color: var(--sky);
}

.nav-spacer { width: 60px; flex-shrink: 0; }

/* ─── Layout ─────────────────────────────────────────────── */
.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 72px 16px 85px;
}

/* ─── Page Header ────────────────────────────────────────── */
.page-header {
  text-align: center;
  margin: 22px 0;
  animation: fadeUp 0.7s ease both;
}

.slabel {
  display: inline-block;
  background: var(--dark);
  color: var(--gold);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 4px 14px;
  border-radius: 4px;
  margin-bottom: 12px;
  border: 2px solid var(--gold);
}

.page-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(22px, 6vw, 34px);
  line-height: 1.2;
  margin-bottom: 6px;
}
.page-title .ac { color: var(--sky); }
.page-title .ag { color: var(--gold); }

.page-sub {
  color: rgba(255, 255, 255, 0.45);
  font-size: 12px;
  letter-spacing: 1px;
}

/* ─── Date Bar ───────────────────────────────────────────── */
.date-bar {
  background: rgba(20, 20, 40, 0.92);
  border: 3px solid var(--dark);
  box-shadow: 4px 4px 0 var(--sky);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  animation: fadeUp 0.7s ease 0.1s both;
}

.date-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.date-bar select {
  flex: 1;
  min-width: 0;
  background: rgba(255, 255, 255, 0.08);
  color: var(--white);
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
}
.date-bar select option { background: #1a1a2e; color: #fff; }

.btn-jump {
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.btn-jump:hover { opacity: 0.85; }

#timeLabel {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(10px, 3vw, 13px);
  color: var(--gold);
  text-align: center;
  letter-spacing: 0.3px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ─── Date Nav (Prev / Next inline) ─────────────────────── */
.date-nav {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
}
.date-nav .btn-prev,
.date-nav .btn-next {
  flex: 0 0 auto;
  padding: 8px 16px;
  font-size: 12px;
  border-radius: 10px;
  box-shadow: none;
}
.date-nav .btn-next {
  box-shadow: 2px 2px 0 var(--gold-dark);
}

/* ─── Censored text (？？？？？) ─────────────────────────── */
.censored {
  display: inline-block;
  filter: blur(3px);
  letter-spacing: 2px;
  user-select: none;
  cursor: default;
}

/* ─── Value Panel ────────────────────────────────────────── */
.value-panel {
  background: rgba(20, 20, 40, 0.92);
  border: 3px solid var(--dark);
  box-shadow: 4px 4px 0 var(--sky);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
  animation: fadeUp 0.7s ease 0.15s both;
}

.hold-list {
  min-height: 34px;
  margin-bottom: 12px;
}

.hold-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 10px;
  border-left: 3px solid;
  border-radius: 0 8px 8px 0;
  margin-bottom: 4px;
  background: rgba(255, 255, 255, 0.05);
  font-size: 12px;
}

.hold-item-name { font-weight: 700; }

.hold-item-val {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.8);
  text-align: right;
}

.hold-empty {
  color: rgba(255, 255, 255, 0.3);
  font-size: 12px;
  padding: 6px 0;
  letter-spacing: 1px;
}

.value-divider {
  border: none;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  margin: 10px 0;
}

.value-nums {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.value-block { text-align: center; }

.value-block-lbl {
  font-size: 9px;
  letter-spacing: 3px;
  color: rgba(255, 255, 255, 0.4);
  display: block;
  margin-bottom: 4px;
}

.value-block-num {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(20px, 5vw, 28px);
  display: block;
  line-height: 1;
}

.value-block-unit {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
  margin-left: 2px;
}

#dispTotal { color: var(--sky); }
#dispDiv   { color: var(--green); }

/* ─── Step Selector ──────────────────────────────────────── */
.step-section {
  margin-bottom: 14px;
  animation: fadeUp 0.7s ease 0.2s both;
}

.step-lbl {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255, 255, 255, 0.35);
  margin-bottom: 7px;
}

.step-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}

.step-btn {
  border: 2px solid;
  border-radius: 10px;
  padding: 10px 4px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  background: transparent;
  -webkit-tap-highlight-color: transparent;
}

.step-btn.plus              { color: var(--gold); border-color: rgba(245, 200, 66, 0.3); }
.step-btn.plus:hover        { background: rgba(245, 200, 66, 0.1); }
.step-btn.plus.active       { background: var(--gold); color: var(--dark); border-color: var(--gold); box-shadow: 3px 3px 0 var(--gold-dark); }

.step-btn.minus             { color: #ff9999; border-color: rgba(232, 53, 74, 0.3); }
.step-btn.minus:hover       { background: rgba(232, 53, 74, 0.1); }
.step-btn.minus.active      { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 3px 3px 0 #900; }

/* ─── Asset Buttons ──────────────────────────────────────── */
.asset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
  animation: fadeUp 0.7s ease 0.25s both;
}

.asset-btn {
  background: var(--cream);
  border: 3px solid var(--dark);
  border-radius: 14px;
  padding: 0;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.asset-btn:hover          { transform: translate(-2px, -2px); }
.asset-btn:active         { transform: scale(0.97); }
.asset-btn:disabled       { opacity: 0.42; cursor: not-allowed; filter: grayscale(0.5); }
.asset-btn:disabled:hover { transform: none; }

.asset-top {
  padding: 10px 12px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #fff;
}

.a-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
.a-name  { font-family: 'Dela Gothic One', sans-serif; font-size: 12px; line-height: 1.2; }

.asset-body { padding: 7px 12px 10px; background: var(--cream); }

.a-price {
  font-size: 11px;
  color: #666;
  display: block;
  margin-bottom: 3px;
}

.a-qty {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 17px;
  color: var(--dark);
  display: block;
}

/* ─── Action Row ─────────────────────────────────────────── */
.action-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  animation: fadeUp 0.7s ease 0.28s both;
}

.btn-reset {
  flex: 1;
  border: 2px solid rgba(232, 53, 74, 0.35);
  border-radius: 10px;
  background: rgba(232, 53, 74, 0.08);
  color: #ff9999;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-reset:hover { background: rgba(232, 53, 74, 0.2); }

/* ─── Navigation Buttons ─────────────────────────────────── */
.nav-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  animation: fadeUp 0.7s ease 0.3s both;
}

.btn-prev {
  flex: 1;
  border: 3px solid var(--sky);
  border-radius: 12px;
  background: transparent;
  color: var(--sky);
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px;
  padding: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-prev:not(:disabled):hover {
  background: rgba(91, 200, 232, 0.1);
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--sky);
}

.btn-next {
  flex: 1.4;
  border: 3px solid var(--dark);
  border-radius: 12px;
  background: var(--gold);
  color: var(--dark);
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px;
  padding: 13px;
  cursor: pointer;
  box-shadow: 4px 4px 0 var(--gold-dark);
  transition: all 0.15s;
}
.btn-next:not(:disabled):hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 var(--gold-dark);
}

.btn-prev:disabled,
.btn-next:disabled {
  opacity: 0.28;
  cursor: not-allowed;
}

/* ─── Cards ──────────────────────────────────────────────── */
.card {
  border: 3px solid var(--dark);
  border-radius: 16px;
  margin-bottom: 14px;
  overflow: hidden;
  background: var(--cream);
  box-shadow: 4px 4px 0 var(--dark);
  animation: fadeUp 0.7s ease 0.35s both;
}
.card-sim  { border-top: 6px solid var(--sky); }
.card-calc { border-top: 6px solid var(--gold); }

.card-header {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 15px;
  color: var(--dark);
  transition: background 0.2s;
  user-select: none;
}
.card-header:hover { background: rgba(0, 0, 0, 0.04); }

.card-body {
  padding: 16px 18px;
  display: none;
  border-top: 2px solid rgba(0, 0, 0, 0.08);
}
.card-body.open { display: block; }

.card-arrow {
  font-size: 11px;
  color: #aaa;
  transition: transform 0.2s;
}
.card-arrow.open { transform: rotate(180deg); }
.card-compare { border-top: 6px solid var(--green); }
.card-titles  { border-top: 6px solid var(--purple); }

/* ─── Graph ──────────────────────────────────────────────── */
.graph-section {
  background: rgba(20,20,40,0.92);
  border: 3px solid var(--dark);
  box-shadow: 4px 4px 0 var(--sky);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 14px;
  animation: fadeUp 0.7s ease 0.31s both;
}
.graph-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.graph-header-label {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  color: var(--sky);
}
.graph-header select {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 4px 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
}
.graph-header select option { background: #1a1a2e; color: #fff; }
#graphSvg {
  width: 100%;
  height: 80px;
  display: block;
  border-radius: 6px;
  background: rgba(0,0,0,0.25);
}
.graph-labels {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: rgba(255,255,255,0.28);
  margin-top: 4px;
  padding: 0 2px;
  letter-spacing: 1px;
}

/* ─── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--gold);
  color: var(--dark);
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 12px;
  border: 3px solid var(--gold-dark);
  box-shadow: 4px 4px 0 var(--gold-dark);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 500;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Compare Table ──────────────────────────────────────── */
.compare-tbl { width: 100%; border-collapse: collapse; font-size: 12px; color: var(--dark); }
.compare-tbl th {
  color: rgba(0,0,0,0.45);
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 6px;
  border-bottom: 2px solid rgba(0,0,0,0.1);
  text-align: right;
  font-weight: 700;
}
.compare-tbl th:first-child { text-align: left; }
.compare-tbl td { padding: 6px 6px; border-bottom: 1px solid rgba(0,0,0,0.06); text-align: right; }
.compare-tbl td:first-child { text-align: left; font-weight: 700; font-size: 13px; }
.compare-tbl .pos { color: #27ae60; font-weight: 700; }
.compare-tbl .neg { color: #c0392b; font-weight: 700; }
.compare-tbl tr:last-child td { border-bottom: none; }

/* ─── Titles ─────────────────────────────────────────────── */
.titles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.title-item { border-radius: 10px; padding: 8px 10px; border: 2px solid; border-top-width: 4px; }
.title-item.unlocked { background: rgba(245,200,66,0.12); border-color: var(--gold); }
.title-item.locked   { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); opacity: 0.42; }
.title-item.s1 { border-top-color: var(--green) !important; }
.title-item.s2 { border-top-color: var(--sky)   !important; }
.title-item.s3 { border-top-color: var(--gold)  !important; }
.title-stars { font-size: 9px; display: block; margin-bottom: 3px; letter-spacing: 1px; }
.title-item.unlocked .title-stars { color: rgba(255,255,255,0.7); }
.title-item.locked   .title-stars { color: rgba(255,255,255,0.25); }
.title-name  { font-family: 'Dela Gothic One', sans-serif; font-size: 11px; display: block; margin-bottom: 2px; }
.title-item.unlocked .title-name { color: var(--gold); }
.title-item.locked   .title-name { color: rgba(255,255,255,0.35); }
.title-desc  { font-size: 9px; display: block; letter-spacing: 0.5px; }
.title-item.unlocked .title-desc { color: rgba(255,255,255,0.55); }
.title-item.locked   .title-desc { color: rgba(255,255,255,0.2); }
.title-prize { font-size: 10px; font-weight: 700; display: block; margin-top: 4px; }
.title-item.unlocked .title-prize { color: var(--gold); }
.title-item.locked   .title-prize { color: rgba(255,255,255,0.25); }

/* ─── Rank (value-panel 3列目) ───────────────────────────── */
.value-nums-3 { grid-template-columns: 1fr 1fr 72px !important; }
#rankVal { font-family: 'Zen Maru Gothic', sans-serif; font-size: clamp(11px,3vw,14px); display: block; line-height: 1.2; font-weight: 700; white-space: nowrap; }

/* ─── Simulator ──────────────────────────────────────────── */
.sim-fields {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.sim-fields label {
  font-size: 11px;
  color: #888;
  display: block;
  margin-bottom: 4px;
}

.sim-fields .f-asset { flex: 1.6; min-width: 120px; }
.sim-fields .f-qty   { flex: 1;   min-width: 80px; }

.sim-fields select,
.sim-fields input {
  background: #fff;
  color: var(--dark);
  border: 2px solid rgba(0, 0, 0, 0.15);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 14px;
  width: 100%;
  font-family: 'Zen Maru Gothic', sans-serif;
}
.sim-fields select option { background: #fff; color: var(--dark); }

.btn-sim {
  background: var(--green);
  color: #fff;
  border: 2px solid var(--dark);
  border-radius: 8px;
  padding: 9px 18px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  cursor: pointer;
  box-shadow: 2px 2px 0 var(--dark);
  transition: all 0.15s;
  flex-shrink: 0;
}
.btn-sim:hover {
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--dark);
}

#simResult {
  background: rgba(91, 200, 232, 0.08);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: #333;
  line-height: 2;
  white-space: pre-line;
  min-height: 44px;
  border-left: 3px solid var(--sky);
}

/* ─── Calculator ─────────────────────────────────────────── */
.calc-disp {
  background: var(--dark);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 24px;
  color: var(--gold);
  text-align: right;
  margin-bottom: 10px;
  overflow-x: auto;
  min-height: 50px;
  word-break: break-all;
}

.calc-keys {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.ckey {
  background: #fff;
  color: var(--dark);
  border: 2px solid rgba(0, 0, 0, 0.1);
  border-radius: 10px;
  padding: 14px 4px;
  font-size: 16px;
  cursor: pointer;
  text-align: center;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  transition: all 0.1s;
  box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.07);
  -webkit-tap-highlight-color: transparent;
}
.ckey:hover  { background: #f0f0f0; }
.ckey:active { transform: scale(0.95); }

.ckey.op       { background: rgba(245, 200, 66, 0.18); color: var(--dark); }
.ckey.op:hover { background: rgba(245, 200, 66, 0.32); }

.ckey.eq {
  background: var(--gold);
  color: var(--dark);
  border-color: var(--gold-dark);
  box-shadow: 2px 2px 0 var(--gold-dark);
}
.ckey.eq:hover {
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--gold-dark);
}

.ckey.cl { background: rgba(232, 53, 74, 0.1); color: var(--red); }
.ckey.bk { background: rgba(91, 200, 232, 0.1); color: var(--sky); }

.ckey-wide { grid-column: span 2; }

/* ─── Character Banner ───────────────────────────────────── */
.char-banner {
  background: rgba(20,20,40,0.85);
  border: 3px solid var(--dark);
  box-shadow: 4px 4px 0 rgba(91,200,232,0.3);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 16px;
  animation: fadeUp 0.7s ease 0.05s both;
}
.char-strip {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
}
.char-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.char-item img {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.12);
  object-fit: cover;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.char-item img.active-speaker {

function updateCharSpeech(year, event) {
  let matchChar = '局長', matchText = '';
  if (year === 0) {
    matchText = 'ようこそ！1970年から時代を旅しながら資産を育てよう！';
  } else {
    const t = year + (event - 1) / 4;
    ERA_COMMENTS.forEach(c => {
      const tFrom = c[0] + (c[1] - 1) / 4;
      const tTo   = c[2] + (c[3] - 1) / 4;
      if (t >= tFrom && t <= tTo) { matchChar = c[4]; matchText = c[5]; }
    });
    if (!matchText) {
      matchChar = '局長';
      matchText = `${year}年、歴史が動いている。どんな資産を選ぶ？`;
    }
  }
  const ch = CHARS[matchChar];
  document.getElementById('speechCharImg').src          = ch.img;
  document.getElementById('speechCharName').textContent = ch.name;
  document.getElementById('speechText').textContent     = matchText;
  Object.values(CHARS).forEach(c => {
    const el = document.getElementById(c.id);
    if (el) el.classList.remove('active-speaker');
  });
  const el = document.getElementById(ch.id);
  if (el) el.classList.add('active-speaker');
}

function updateEventOptions() {
  const year = parseInt(document.getElementById('selY').value);

    selE.innerHTML = '<option value="0">チュートリアル</option>';

  for (let e = 1; e <= 4; e++) {
    const o = document.createElement('option');
    o.value = e;
    o.textContent = `イベント${e}`;
    selE.appendChild(o);
  }
}

function setStep(n, btn) {
  step = n;
  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ─── History ─────────────────────────────────────────────────
function pushHistory() {
  history.push({ holdings: { ...holdings }, pendingSell, currentIndex });
  if (history.length > 30) history.shift();
}

function undoAction() {
  if (!history.length) return;
  const s = history.pop();
  Object.assign(holdings, s.holdings);
  pendingSell = s.pendingSell;
  currentIndex = s.currentIndex;
  const row = masterData[currentIndex];
  document.getElementById('selY').value = row.年;
  updateEventOptions();
  if (row.イベント > 0) document.getElementById('selE').value = row.イベント;
  updateDisplay();
}

function canBuyAsset(id, row) {
  if (row[id] === 0) return false;
  // 国債はE1のみ購入可
  if (id === '国債' && step > 0 && row.イベント !== 1) return false;
  // 仮想通貨は2014E4から購入可
  if (id === '？？？？？' && step > 0) {
    if (row.年 < 2014 || (row.年 === 2014 && row.イベント < 4)) return false;
    if ((holdings['？？？？？'] || 0) >= 3) return false;
  }
  return true;
}

function pressAsset(id) {
  const row = masterData[currentIndex];
  if (!row) return;
  if (step > 0 && !canBuyAsset(id, row)) return;
  if (step < 0 && row[id] === 0) return;
  pushHistory();
  if (id === '不動産' && step < 0) {
    const available = (holdings['不動産'] || 0) - pendingSell;
    const addOrder = Math.min(Math.abs(step), available);
    if (addOrder > 0) pendingSell += addOrder;
  } else if (id === '？？？？？' && step > 0) {
    const current = holdings['？？？？？'] || 0;
    const buy = Math.min(step, 3 - current);
    if (buy > 0) holdings['？？？？？'] = current + buy;
  } else {
    holdings[id] = Math.max(0, (holdings[id] || 0) + step);
  }
  updateDisplay();
}

function assetReset() {
  if (!confirm('保有資産をすべてリセットしますか？')) return;
  pushHistory();
  ASSET_KEYS.forEach(a => { holdings[a.id] = 0; });
  pendingSell = 0;
  updateDisplay();
}

function stepTime(dir) {
  const ni = currentIndex + dir;
  if (ni < 0 || ni >= masterData.length) return;
  pushHistory();
  // NEXT時に不動産の売り注文を実行
  if (dir === 1 && pendingSell > 0) {
    holdings['不動産'] = Math.max(0, (holdings['不動産'] || 0) - pendingSell);
    pendingSell = 0;
  }
  currentIndex = ni;
  const row = masterData[currentIndex];
  document.getElementById('selY').value = row.年;
  updateEventOptions();
  if (row.イベント > 0) document.getElementById('selE').value = row.イベント;
  updateDisplay();
}

function dateJump() {
  const y   = parseInt(document.getElementById('selY').value);
  const e   = parseInt(document.getElementById('selE').value || 0);
  const idx = masterData.findIndex(r => r.年 === y && r.イベント === e);
  if (idx < 0) return;
  pushHistory();
  currentIndex = idx;
  updateDisplay();
}

// ============================================================
// DISPLAY
// ============================================================
function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

function updateDisplay() {
  const row = masterData[currentIndex];
  if (!row) return;

  document.getElementById('timeLabel').textContent =
    row.年 === 0
      ? 'チュートリアル'
      : `${row.年}年 イベント${row.イベント}`;

  let total = 0, divT = 0;
  ASSET_KEYS.forEach(a => {
    const q = holdings[a.id] || 0;
    total += q * (row[a.id] || 0);
    if (a.divKey) divT += q * (row[a.divKey] || 0);
  });
  document.getElementById('dispTotal').textContent = fmt(total);
  document.getElementById('dispDiv').textContent   = fmt(divT);

  // ランク
  const g = getGrade(total);
  const rv = document.getElementById('rankVal');
  rv.textContent = g.grade;
  rv.style.color = g.color;

  // 保有リスト（不動産の売り注文中も表示）
  let html = '';
  ASSET_KEYS.forEach(a => {
    const q = holdings[a.id] || 0;
    if (!q && !(a.id === '不動産' && pendingSell > 0)) return;
    const p = row[a.id] || 0;
    const displayLabel = a.id === '？？？？？' ? getCryptoLabel(row) : a.label;
    const orderBadge = (a.id === '不動産' && pendingSell > 0)
      ? ` <span style="color:#ff9999;font-size:10px">⏳売り注文中 ${pendingSell}口</span>` : '';
    if (q > 0) {
      html += `<div class="hold-item" style="border-left-color:${a.color}">
        <span class="hold-item-name" style="color:${a.color}">${a.emoji} ${displayLabel}${orderBadge}</span>
        <span class="hold-item-val">${q}口 × ${fmt(p)} = ${fmt(q * p)}円</span>
      </div>`;
    } else if (a.id === '不動産' && pendingSell > 0) {
      html += `<div class="hold-item" style="border-left-color:${a.color}">
        <span class="hold-item-name" style="color:${a.color}">${a.emoji} ${a.label}${orderBadge}</span>
        <span class="hold-item-val">次ターンで売却</span>
      </div>`;
    }
  });
  document.getElementById('holdList').innerHTML =
    html || '<div class="hold-empty">保有なし</div>';

  // 資産ボタン
  ASSET_KEYS.forEach(a => {
    const btn = document.getElementById('abtn-' + a.id);
    if (!btn) return;
    const price = row[a.id] || 0;
    const exists = price > 0;
    // 購入可否チェック（国債E1制限・仮想通貨2014E4制限・上限3口）
    const buyable = exists && canBuyAsset(a.id, { ...row, イベント: row.イベント });
    const sellable = exists && (holdings[a.id] || 0) > 0;
    const ok = exists;
    btn.disabled = !ok;
    btn.style.boxShadow = ok ? `4px 4px 0 ${a.shadow}` : '2px 2px 0 rgba(0,0,0,0.08)';
    const orderInfo = (a.id === '不動産' && pendingSell > 0)
      ? `<span style="display:block;font-size:9px;color:#ff9999;margin-top:2px">⏳売注 ${pendingSell}口</span>` : '';
    // 国債の購入不可ターンは価格表示に注記
    const bondNote = (a.id === '国債' && row.イベント !== 1 && ok)
      ? '<span style="display:block;font-size:8px;color:#ff9999">購入はE1のみ</span>' : '';
    // 仮想通貨の購入不可期間・上限注記
    const cryptoNote = a.id === '？？？？？' && ok
      ? ((row.年 < 2014 || (row.年 === 2014 && row.イベント < 4))
          ? '<span style="display:block;font-size:8px;color:#ff9999">2014E4から購入可</span>'
          : (holdings['？？？？？'] || 0) >= 3
            ? '<span style="display:block;font-size:8px;color:#ff9999">上限3口</span>' : '')
      : '';
    const displayLabel = a.id === '？？？？？' ? getCryptoLabel(row) : a.label;
    const qtyInfo = a.id === '？？？？？'
      ? `${holdings[a.id] || 0}/3口${orderInfo}` : `${holdings[a.id] || 0}口${orderInfo}`;
    btn.innerHTML = `<div class="asset-top" style="background:${a.color}">
      <span class="a-emoji">${a.emoji}</span>
      <span class="a-name">${displayLabel}</span>
    </div>
    <div class="asset-body">
      <span class="a-price">${ok ? fmt(price) + '円/口' : '─ 未登場 ─'}${bondNote}${cryptoNote}</span>
      <span class="a-qty">${qtyInfo}</span>
    </div>`;
  });

  document.getElementById('btnPrev').disabled = currentIndex <= 0;
  document.getElementById('btnNext').disabled = currentIndex >= masterData.length - 1;

  // 記録・グラフ・称号チェック・比較カード更新・キャラセリフ
  recordPortfolio();
  drawGraph();
  if (graphMode === 'portfolio' && document.getElementById('tab-graph').classList.contains('active')) {
    drawPortfolioGraph();
  }
  checkTitles(total);
  renderCompare();
  renderTitles();
  updateCharSpeech(row.年, row.イベント);
}

// ============================================================
// SIMULATOR
// ============================================================
function doSim() {
  const row = masterData[currentIndex];
  if (!row) return;
  const id     = document.getElementById('simAsset').value;
  const qty    = Math.max(0, parseInt(document.getElementById('simQty').value) || 0);
  const price  = row[id] || 0;
  const a      = ASSET_KEYS.find(x => x.id === id);
  const divPer = (a && a.divKey) ? (row[a.divKey] || 0) : 0;
  const cost   = qty * price;
  const divAmt = qty * divPer;
  const yPct   = (price > 0 && divPer > 0) ? ((divPer * 4 / price) * 100).toFixed(2) : '—';
  document.getElementById('simResult').textContent =
    `購入コスト  : ${fmt(cost)} 円\n配当(1ターン): ${fmt(divAmt)} 円\n配当(年間)  : ${fmt(divAmt * 4)} 円\n利回り目安  : ${yPct} %`;
}

// ============================================================
// PORTFOLIO GRAPH
// ============================================================
function recordPortfolio() {
  const row = masterData[currentIndex];
  if (!row || row.年 === 0) return;
  const snap = { idx: currentIndex, 年: row.年, イベント: row.イベント, values: {}, total: 0 };
  ASSET_KEYS.forEach(a => {
    const val = (holdings[a.id] || 0) * (row[a.id] || 0);
    snap.values[a.id] = val;
    snap.total += val;
  });
  const ei = portfolioHistory.findIndex(h => h.idx === currentIndex);
  if (ei >= 0) portfolioHistory[ei] = snap;
  else { portfolioHistory.push(snap); portfolioHistory.sort((a, b) => a.idx - b.idx); }
}

function drawPortfolioGraph() {
  const svg    = document.getElementById('portfolioSvg');
  const legend = document.getElementById('portfolioLegend');
  const labels = document.getElementById('portfolioLabels');
  const W = 600, H = 200, PX = 8, PY = 10;

  const hist = portfolioHistory;
  if (hist.length < 2) {
    svg.innerHTML = `<text x="300" y="100" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="14" font-family="sans-serif">資産を購入すると表示されます</text>`;
    legend.innerHTML = ''; labels.innerHTML = '';
    document.getElementById('portfolioTotal').textContent = '─';
    return;
  }

  const maxTot = Math.max(...hist.map(h => h.total)) || 1;
  const n = hist.length;
  const toX = i => PX + (i / (n - 1)) * (W - 2 * PX);
  const toY = v => PY + (1 - v / maxTot) * (H - 2 * PY);

  const assetsWithValue = ASSET_KEYS.filter(a => hist.some(h => h.values[a.id] > 0));
  let svgContent = '';

  for (let ai = assetsWithValue.length - 1; ai >= 0; ai--) {
    const pts = [];
    for (let i = 0; i < n; i++) {
      let cum = 0;
      for (let j = 0; j <= ai; j++) cum += hist[i].values[assetsWithValue[j].id] || 0;
      pts.push(`${toX(i).toFixed(1)},${toY(cum).toFixed(1)}`);
    }
    for (let i = n - 1; i >= 0; i--) {
      let cum = 0;
      for (let j = 0; j < ai; j++) cum += hist[i].values[assetsWithValue[j].id] || 0;
      pts.push(`${toX(i).toFixed(1)},${toY(cum).toFixed(1)}`);
    }
    svgContent += `<polygon points="${pts.join(' ')}" fill="${assetsWithValue[ai].color}" opacity="0.75"/>`;
  }

  const topPts = hist.map((h, i) => `${toX(i).toFixed(1)},${toY(h.total).toFixed(1)}`).join(' ');
  svgContent += `<polyline points="${topPts}" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linejoin="round"/>`;
  svg.innerHTML = svgContent;

  const sH = hist[0], eH = hist[n - 1], mH = hist[Math.floor(n / 2)];
  labels.innerHTML = `<span>${sH.年}年</span><span>${mH.年}年</span><span>${eH.年}年</span>`;
  document.getElementById('portfolioTotal').textContent = fmt(eH.total) + '円';
  legend.innerHTML = assetsWithValue.map(a =>
    `<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:rgba(255,255,255,0.75)">
      <div style="width:8px;height:8px;border-radius:50%;background:${a.color};flex-shrink:0"></div>
      <span>${a.emoji}</span>
    </div>`
  ).join('');
}

function setGraphMode(mode, btn) {
  graphMode = mode;
  document.querySelectorAll('.graph-mode-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('graphModePrice').style.display     = mode === 'price'     ? '' : 'none';
  document.getElementById('graphModePortfolio').style.display = mode === 'portfolio' ? '' : 'none';
  if (mode === 'portfolio') drawPortfolioGraph();
  else { drawGraph(); renderCompare(); }
}

// ============================================================
// GRAPH
// ============================================================
function drawGraph() {
  const id     = document.getElementById('graphAsset').value;
  const svg    = document.getElementById('graphSvg');
  const labels = document.getElementById('graphLabels');
  const W = 600, H = 80, PX = 8, PY = 6;

  const endIdx   = Math.max(1, currentIndex);
  const startIdx = 1;
  const count    = endIdx - startIdx + 1;

  if (count < 2) {
    svg.innerHTML = `<text x="300" y="44" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="11" font-family="sans-serif">1970年以降のデータなし</text>`;
    labels.innerHTML = '';
    return;
  }

  const prices = [];
  for (let i = startIdx; i <= endIdx; i++) prices.push(masterData[i][id] || 0);

  const minP  = Math.min(...prices);
  const maxP  = Math.max(...prices);
  const range = maxP - minP || 1;

  const toX = i => PX + (i / (count - 1)) * (W - 2 * PX);
  const toY = p => PY + (1 - (p - minP) / range) * (H - 2 * PY);

  const pts    = prices.map((p, i) => `${toX(i).toFixed(1)},${toY(p).toFixed(1)}`).join(' ');
  const lastX  = toX(count - 1).toFixed(1);
  const lastY  = toY(prices[count - 1]).toFixed(1);

  svg.innerHTML =
    `<polyline points="${pts}" fill="none" stroke="var(--sky)" stroke-width="1.8" stroke-linejoin="round"/>` +
    `<line x1="${lastX}" y1="${PY}" x2="${lastX}" y2="${H - PY}" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="2,2"/>` +
    `<circle cx="${lastX}" cy="${lastY}" r="3.5" fill="var(--gold)" stroke="rgba(0,0,0,0.4)" stroke-width="1.2"/>`;

  const sRow = masterData[startIdx];
  const eRow = masterData[endIdx];
  const mRow = masterData[Math.floor((startIdx + endIdx) / 2)];
  labels.innerHTML = `<span>${sRow.年}年</span><span>${mRow.年}年</span><span>${eRow.年}年</span>`;
}

// ============================================================
// GRADE
// ============================================================
function getGrade(total) {
  if (total >= 1_000_000_000_000) return { grade: '👑伝説', color: '#e040fb' };
  if (total >= 1_000_000_000)     return { grade: '💎資産家', color: 'var(--gold)' };
  if (total >= 100_000_000)       return { grade: '🏆億り人', color: 'var(--gold)' };
  if (total >= 10_000_000)        return { grade: '🏦ベテラン', color: 'var(--sky)' };
  if (total >= 1_000_000)         return { grade: '💼中堅', color: 'var(--green)' };
  if (total > 0)                  return { grade: '🌱初心者', color: '#aaa' };
  return { grade: '─', color: '#555' };
}

// ============================================================
// COMPARE
// ============================================================
function renderCompare() {
  if (!document.getElementById('tab-graph').classList.contains('active')) return;
  const row = masterData[currentIndex];
  if (!row) return;

  let rows = '';
  ASSET_KEYS.forEach(a => {
    const price = row[a.id] || 0;
    if (price === 0) { rows += `<tr><td>${a.emoji} ${a.label}</td><td colspan="3" style="text-align:center;color:#bbb">未登場</td></tr>`; return; }
    const pct    = ((price - 100000) / 100000 * 100).toFixed(1);
    const pctCls = parseFloat(pct) >= 0 ? 'pos' : 'neg';
    const sign   = parseFloat(pct) >= 0 ? '+' : '';
    const divPer = a.divKey ? (row[a.divKey] || 0) : 0;
    const yield_ = (price > 0 && divPer > 0) ? ((divPer * 4 / price) * 100).toFixed(2) + '%' : '─';
    rows += `<tr>
      <td>${a.emoji} ${a.label}</td>
      <td>${fmt(price)}円</td>
      <td class="${pctCls}">${sign}${pct}%</td>
      <td>${yield_}</td>
    </tr>`;
  });

  document.getElementById('compareTable').innerHTML =
    `<table class="compare-tbl">
      <thead><tr><th>資産</th><th>現在価格</th><th>1970比</th><th>配当利回り</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ============================================================
// TITLES
// ============================================================
let _toastTimer = null;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function checkTitles(total) {
  TITLES.forEach(t => {
    if (unlockedTitles.has(t.id)) return;
    try {
      if (t.check(total)) {
        unlockedTitles.add(t.id);
        const prize = PRIZE[t.stars];
        showToast(`🏅 バッジ獲得！「${t.name}」 +${fmt(prize)}円`);
      }
    } catch(e) {}
  });
}

function renderTitles() {
  if (!document.getElementById('tab-titles').classList.contains('active')) return;
  const unlocked = unlockedTitles.size;
  document.getElementById('titlesSummary').textContent = `${unlocked} / ${TITLES.length} バッジ獲得`;
  let html = '';
  const censor = s => s.replace(/？？？？？/g, '<span class="censored">？？？？？</span>');
  TITLES.forEach(t => {
    const cls   = unlockedTitles.has(t.id) ? 'unlocked' : 'locked';
    const icon  = unlockedTitles.has(t.id) ? '🏆' : '🔒';
    const stars = '⭐'.repeat(t.stars);
    const prize = fmt(PRIZE[t.stars]);
    html += `<div class="title-item ${cls} s${t.stars}">
      <span class="title-stars">${stars} +${prize}円</span>
      <span class="title-name">${icon} ${censor(t.name)}</span>
      <span class="title-desc">${censor(t.desc)}</span>
    </div>`;
  });
  document.getElementById('titlesGrid').innerHTML = html;
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'titles') renderTitles();
  if (name === 'graph') {
    if (graphMode === 'portfolio') drawPortfolioGraph();
    else { drawGraph(); renderCompare(); }
  }
}

// ============================================================
// CALCULATOR
// ============================================================
let cBuf = '0', cOpr = null, cPrev = null, cNew = false;

function cDisp() { document.getElementById('calcDisp').textContent = cBuf; }

function cIn(v) {
  if (cNew) { cBuf = String(v); cNew = false; }
  else cBuf = cBuf === '0' ? String(v) : cBuf + v;
  cDisp();
}

function cDot() {
  if (cNew) { cBuf = '0.'; cNew = false; }
  else if (!cBuf.includes('.')) cBuf += '.';
  cDisp();
}

function cOp(op) {
  if (cOpr && !cNew) cSolve(false);
  cPrev = parseFloat(cBuf);
  cOpr  = op;
  cNew  = true;
}

function cSolve(reset = true) {
  if (!cOpr || cPrev === null) return;
  const cur = parseFloat(cBuf);
  const p   = cPrev;
  let res;
  if      (cOpr === '+') res = p + cur;
  else if (cOpr === '-') res = p - cur;
  else if (cOpr === '×') res = p * cur;
  else if (cOpr === '÷') res = cur !== 0 ? p / cur : 0;
  else if (cOpr === '%') res = p * cur / 100;
  cBuf = String(parseFloat(res.toFixed(8)));
  if (reset) { cOpr = null; cPrev = null; cNew = true; }
  cDisp();
}

function cClear() { cBuf = '0'; cOpr = null; cPrev = null; cNew = false; cDisp(); }
function cBack()  { cBuf = cBuf.length > 1 ? cBuf.slice(0, -1) : '0'; cDisp(); }
