.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#8b949e}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CARDS */
.cards{padding:12px 20px 40px;display:flex;flex-direction:column;gap:10px}
.era-section{margin-bottom:4px}
.era-heading{font-size:15px;font-weight:700;color:#f5c842;padding:8px 0 4px;border-bottom:1px solid #21262d;margin-bottom:8px}

.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px 14px;transition:border-color .2s}
.card:hover{border-color:#5bc8e8}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.year-badge{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:2px 8px;font-size:11px;color:#f5c842;font-weight:700;white-space:nowrap;flex-shrink:0}
.event-date{font-size:11px;color:#8b949e;white-space:nowrap;flex-shrink:0}
.event-name{font-size:14px;font-weight:700;color:#e6edf3;flex:1}
.game-btn{background:transparent;border:1px solid #f5c842;color:#f5c842;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;text-decoration:none;display:inline-block}
.game-btn:hover{background:#f5c842;color:#0d1117;text-decoration:none}

.desc{font-size:12px;color:#8b949e;line-height:1.6;margin-bottom:10px}

/* ASSET BARS */
.assets-grid{display:flex;flex-direction:column;gap:4px}
.asset-row{display:flex;align-items:center;gap:6px}
.asset-label{font-size:10px;color:#8b949e;width:38px;flex-shrink:0;text-align:right}
.bar-wrap{flex:1;background:#21262d;border-radius:3px;height:10px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.asset-pct{font-size:10px;color:#e6edf3;width:52px;flex-shrink:0;text-align:right}

/* RESULT COUNT */

  '1973-2': 'インフレが加速。石油危機の前から物価上昇が始まり、株価は高値圏で不安定な動きを見せる。',

  '1973-4': '「狂乱物価」と呼ばれたインフレが猛威を振るう。トイレットペーパー騒動など買い占めが相次ぎ、消費者物価が急騰。',
  '1974-1': '石油危機の影響が本格化。エネルギーコストの急騰で製造業の収益が悪化し、景気後退が鮮明に。',
  '1974-2': '戦後初のマイナス成長（実質GDP -1.2%）を記録。高度成長の終焉を告げる歴史的な年となった。',
  '1974-3': '景気後退の中、株価は大幅下落。一方で金価格は引き続き高騰し、インフレヘッジとしての金への注目が高まる。',
  '1974-4': '不況が深刻化する中でも金価格は上昇を続ける。インフレと経済停滞が同時に起きるスタグフレーション。',
  '1975-1': '景気が底打ちの兆し。政府の財政出動と金融緩和が効果を発揮し始め、株価は反発局面に入る。',
  '1975-2': '第1回先進国首脳会議（G7サミット）がフランス・ランブイエで開催。国際協調で世界経済の安定を図る。',
  '1975-3': '安定成長への移行期。高度成長時代は終わりを告げ、より持続可能な成長モデルへの転換が始まる。',
  '1975-4': '経済は安定を取り戻す。省エネ・高付加価値産業へのシフトが進み、日本経済の体質改善が進む。',
  '1976-1': 'ロッキード事件が発覚。田中角栄前首相が逮捕され、政治スキャンダルが経済の先行き不透明感を高める。',
  '1976-2': '政治的混乱の中でも景気は安定を維持。輸出企業の競争力が高まり、貿易黒字が拡大。',
  '1976-3': '田中前首相が逮捕。政治への不信が高まるも、企業業績は堅調で株価への直接的影響は限定的。',
  '1976-4': '輸出主導の景気回復が進む。自動車・電機の輸出が急増し、日本製品が世界市場を席巻し始める。',
  '1977-1': '円高局面に突入。貿易黒字の拡大を受け円が急騰し、輸出企業の業績に影響が出始める。',
  '1977-2': '日米貿易摩擦が激化。自動車・電機製品の輸出急増に米国が反発し、通商問題が外交課題に。',
  '1977-3': '円高が続き輸出企業は苦境に。一方で円高メリットを受ける輸入品・資源コストは低下。',
  '1977-4': '円が300円台を突破する大幅円高。輸出産業への打撃は大きいが、国内消費者にはエネルギー安の恩恵。',
  '1978-1': '円高が進む中、金価格が上昇。インフレヘッジとしての金需要が高まり、1オンス=200ドル台に。',
  '1978-2': '日中平和友好条約締結。中国との経済関係強化への期待が高まり、将来の巨大市場への扉が開く。',
  '1978-3': '円が250円台に突入。円高による輸出競争力低下が懸念されるが、内需は底堅く推移。',
  '1978-4': 'イランのイスラム革命前夜。第二次オイルショックの兆候が現れ、原油先物が上昇し始める。',
  '1979-1': 'イラン革命で第二次オイルショック勃発。原油価格が再び急騰し、日本経済にインフレ圧力が高まる。',
  '1979-2': 'イラン・イラク戦争勃発。ペルシャ湾岸の産油国から原油供給が不安定化し、価格がさらに急騰。',
  '1979-3': 'インフレが再燃。第一次オイルショックの教訓から日本政府は迅速な引き締め策を実施。',
  '1979-4': '金価格が歴史的な急騰を記録。世界的なインフレ懸念と地政学リスクで金への資金流入が加速。',
  '1980-1': '金が最高値を更新（1オンス=800ドル超）。インフレ・地政学リスクへの避難需要が極限に達した。',
  '1980-2': 'イラン・イラク戦争が本格化。ペルシャ湾の緊張で原油供給懸念が続くが、石油消費国は省エネ対応を加速。',
  '1980-3': '公定歩合を大幅引き上げ。インフレ抑制のための金融引き締めで景気は冷え込むが、物価は安定へ向かう。',
  '1980-4': '省エネ技術の普及で日本の製造業競争力が向上。自動車の燃費性能で世界をリードし輸出が拡大。',
  '1981-1': 'レーガン大統領が就任しレーガノミクスを推進。大規模減税と規制緩和でドル高・高金利が続く。',
  '1981-2': '米国の高金利政策でドルが急騰。円安・ドル高が進み、日本の輸出企業には追い風となる。',
  '1981-3': '日米貿易摩擦が激化。日本製品の輸入急増に米国が強硬姿勢を示し、自動車輸出自主規制が議題に。',
  '1981-4': '自動車輸出自主規制を実施。数量制限の中で利益率の高い高級車・高付加価値車にシフトする戦略へ。',
  '1982-1': '円安・ドル高が続く。輸出企業の業績が好調で株価は上昇基調。',
  '1982-2': 'フォークランド紛争が勃発。地政学リスクが高まるが、日本経済への直接的影響は限定的。',
  '1982-3': '世界的な不況の中で景気が底打ち。米国のインフレ抑制と高金利が世界経済を圧迫していた。',
  '1982-4': '株価が回復。米国のインフレ抑制が成功し、先進国で景気回復の動きが広がり始める。',
  '1983-1': '景気回復が鮮明に。輸出好調と内需拡大が相乗効果をもたらし、日本経済は安定成長軌道に乗る。',
  '1983-2': '任天堂がファミコンを発売。テレビゲーム産業という新しい産業が誕生し、コンテンツ輸出の時代が始まる。',
  '1983-3': '景気拡大が続く。自動車・電機の輸出が牽引役となり、日本の製造業は世界トップクラスに成長。',
  '1983-4': '株価が上昇基調。企業業績の改善と経済の安定を背景に、個人投資家の株式投資への関心が高まる。',
  '1984-1': '円安が続き輸出が絶好調。日本企業の対米輸出は過去最高を記録し、貿易黒字が急拡大。',
  '1984-2': '半導体産業が急成長。DRAMなどの半導体で日本メーカーが世界シェアを握り、ハイテク産業が台頭。',
  '1984-3': '日米半導体摩擦が深刻化。日本の半導体輸出急増に米国が反発し、業界に対する圧力が高まる。',
  '1984-4': '円安が続き1ドル=250円台。輸出企業には恩恵だが、原油など輸入コストの上昇が懸念される。',
  '1985-1': 'つくば科学博覧会開催。科学技術立国を掲げる日本の先端技術が世界に披露される。',
  '1985-2': 'NTT民営化・電電公社解体（4月）。通信自由化が始まり、後の情報通信革命の基盤が整備される。',
  '1985-3': 'プラザ合意（9月）。G5がドル高是正に合意し、円が一気に急騰。輸出産業に大きな転換点。',
  '1985-4': '円が200円を割り込む急騰。プラザ合意後の円高で輸出企業の業績悪化懸念が広がる。',
  '1986-1': '円高不況に突入。急激な円高で輸出競争力が低下し、製造業を中心に業績悪化・工場閉鎖が相次ぐ。',
  '1986-2': '円が150円台まで急騰。円高不況を克服するため、政府・日銀は金融緩和策を実施。これがバブルの種に。',
  '1986-3': '低金利政策でバブルの種が蒔かれる。株式市場と不動産市場に過剰な資金が流入し始める。',
  '1986-4': '株価・地価の上昇が加速。低金利と旺盛な企業業績を背景に資産価格バブルが本格化し始める。',
  '1987-1': 'バブル景気が本格化。株価は急騰し、「財テク」ブームで企業も個人も資産運用に熱狂する時代。',
  '1987-2': 'NTT株が上場し大人気に。100万円以上の抽選に殺到し、株式投資ブームが一般市民にも波及する。',
  '1987-3': 'ブラックマンデー直前の最高値圏。日本株はバブルに向けてさらに上昇を続けていた。',
  '1987-4': 'ブラックマンデー（10月19日）。米国株が一日で22%下落する歴史的暴落が世界市場を直撃。',
  '1988-1': 'ブラックマンデーから急回復。日本株は暴落前の水準を取り戻し、バブルは勢いを増して継続。',
  '1988-2': '地価高騰が東京圏を中心に全国に波及。「土地神話」が絶頂を迎え、財テクブームが加速する。',
  '1988-3': '青函トンネル・瀬戸大橋が相次いで開通。日本のインフラ整備が進み、国内経済の一体化が深まる。',
  '1988-4': '日経平均が3万円台を突破。バブル経済の象徴となる歴史的な水準に到達し、投資熱は最高潮に。',
  '1989-1': '昭和天皇崩御、平成の世が始まる。元号が変わる中でもバブル経済は衰えを見せず拡大を続ける。',
  '1989-2': '消費税3%導入（4月）。日本初の消費税に反発も大きかったが、バブル景気の中では影響は限定的。',
  '1989-3': 'ベルリンの壁崩壊。冷戦終結の象徴的出来事だが、バブルに沸く日本では「対岸の出来事」として映った。',
  '1989-4': '日経平均が史上最高値38,915円を記録（12月29日）。バブル経済の絶頂。この後、崩壊が始まる。',
  '1990-1': 'バブル崩壊開始。日銀の急速な金利引き上げ（公定歩合6%）で株価が急落。土地も反転下落へ。',
  '1990-2': '湾岸危機で株価が急落。イラクのクウェート侵攻で原油高・世界不安が重なりダブルパンチに。',
  '1990-3': '湾岸戦争勃発。原油高でコスト増、株価の下落が続き「平成不況」の始まりが意識される。',
  '1990-4': '金融引き締めが強化され株価・不動産が急落。バブル崩壊の本格化で失われた30年の幕が開く。',
  '1991-1': '湾岸戦争終結。しかし日本国内では不動産価格の急落が始まり、バブル崩壊の現実が明らかに。',
  '1991-2': 'バブル崩壊が加速。不良債権問題が金融機関の経営を圧迫し始め、企業倒産が急増する。',
  '1991-3': 'ソ連崩壊。冷戦終結で世界が変わる一方、日本は深刻な不況に突入。株価・不動産の下落が止まらない。',
  '1991-4': '不動産価格の下落が全国に広がる。バブル期に高騰した地価が急落し、担保割れ・不良債権が急増。',
  '1992-1': '株価が2万円を割り込む。バブル最盛期の3分の1以下に急落し、金融機関の経営危機が表面化。',
  '1992-2': '宮沢内閣が景気対策を実施。財政出動で景気を下支えしようとするが、構造問題は解決されない。',
  '1992-3': '不良債権問題が深刻化。金融機関に巨大な不良債権が積み上がり、貸し渋りで中小企業が苦境に。',
  '1992-4': '長期デフレ不況に突入。バブル崩壊後の「失われた10年」の序章。資産デフレが日本経済を蝕む。',
  '1993-1': '細川連立政権が発足。55年体制が崩壊し政権交代が実現したが、経済問題の解決には至らず。',
  '1993-2': '38年ぶりの政権交代。自民党が下野し非自民連立政権が誕生。政治の転換期だが景気は低迷続く。',
  '1993-3': '円高が急進。1ドル=100円台に突入し、輸出企業の業績が深刻に悪化。「超円高」時代の幕開け。',
  '1993-4': '超円高・不況が続く。輸出企業は空洞化（生産拠点の海外移転）を加速させ、国内雇用が減少。',
  '1994-1': '景気回復の兆しが見えるが依然不透明。政府の総合経済対策で一時的な持ち直しが見られる。',

  '1994-3': '円が最高値に迫る。輸出企業の苦境が続く中、政府・日銀は円高是正に向けた協調介入を検討。',
  '1994-4': '平成不況の深刻化。金融機関の不良債権処理が進まず、景気の本格回復には至らない状況が続く。',
  '1995-1': '阪神淡路大震災（1月17日）。6,434人が犠牲になった未曾有の大震災。復興特需が一部で景気を下支え。',
  '1995-2': '地下鉄サリン事件（3月）。オウム真理教による無差別テロで社会が震撼。消費マインドが低下。',
  '1995-3': '円が史上最高値1ドル=79円75銭を記録（4月）。超円高で輸出産業は壊滅的な打撃を受ける。',
  '1995-4': '米国の協調介入で円高が是正。政府・日銀の政策転換で円が反転し、輸出企業の業績が回復に向かう。',
  '1996-1': '景気が緩やかに回復。円安転換と財政出動の効果が現れ、株価も2万円台を回復する場面も。',
  '1996-2': '橋本内閣が行財政改革を推進。財政再建を優先する政策方針が示されるが、景気への副作用も懸念される。',
  '1996-3': '住専（住宅金融専門会社）問題で金融不安が再燃。公的資金投入をめぐり国民の批判が高まる。',
  '1996-4': '消費税増税（3%→5%）が決定。97年4月からの実施が決まり、駆け込み需要と増税後の反動が懸念される。',
  '1997-1': '消費税が5%に引き上げ（4月）。駆け込み需要の反動で消費が急減し、景気回復に水を差した。',
  '1997-2': 'タイバーツ暴落を発端にアジア通貨危機が始まる。韓国・インドネシアなどに危機が波及。',
  '1997-3': '山一証券・北海道拓殖銀行が相次いで破綻。日本の金融システムへの信頼が揺らぐ歴史的事件。',
  '1997-4': '金融危機が深刻化。銀行間の貸し渋りが広がり、日本発の金融システム崩壊への懸念が世界に広がる。',
  '1998-1': '金融機関の不安が続く。長期信用銀行・日本債券信用銀行の問題が表面化し、金融不安が継続。',
  '1998-2': '長銀・日債銀が経営危機。特別公的管理（実質国有化）の議論が始まり、金融システム改革が加速。',
  '1998-3': 'ロシア財政危機とLTCM（米ヘッジファンド）破綻。世界的な信用収縮でリスク回避の円買いが急進。',
  '1998-4': '日銀がゼロ金利政策を開始。史上初のゼロ金利で景気を下支え。預金金利がほぼゼロの時代が始まる。',
  '1999-1': 'IT革命とインターネット普及が加速。ヤフー・楽天など新興IT企業が台頭し、株式市場を席巻し始める。',
  '1999-2': 'ITバブルが加速。ナスダック指数が急騰し、テクノロジー株への熱狂が世界を包む。',
  '1999-3': '新興株式市場（マザーズ・ナスダックジャパン）ブーム。億万長者を生んだIT株投資に個人も殺到。',

  '2000-1': 'ITバブルが最高潮。ナスダックが史上最高値を更新し、インターネット企業の時価総額が天文学的数字に。',
  '2000-2': 'ITバブルが崩壊し始める。ナスダック指数が3月をピークに急落し、IT株の多くが9割以上下落。',
  '2000-3': 'ネット株の暴落が続く。「ドットコムバブル崩壊」として、無収益IT企業が次々と倒産・上場廃止に。',
  '2000-4': 'ITバブル崩壊が深刻化。IT投資の縮小が実体経済に波及し、世界同時不況の懸念が高まる。',
  '2001-1': '小泉純一郎内閣が発足（4月）。「聖域なき構造改革」を掲げ、郵政民営化・不良債権処理を推進。',
  '2001-2': '不良債権処理の加速。小泉改革で金融機関の不良債権処理が促進され、一時的に景気が悪化。',
  '2001-3': '9.11米同時多発テロ（9月11日）。世界が震撼し、株価が急落。航空・観光業界に壊滅的な打撃。',
  '2001-4': 'アフガニスタン紛争が始まる。地政学リスクの高まりで世界経済の先行き不透明感が続く。',
  '2002-1': 'デフレが深刻化。物価が持続的に下落し、企業収益と賃金が低下するデフレスパイラルが懸念される。',
  '2002-2': '日韓共催のサッカーW杯が開催。スポーツで盛り上がるも、株価はバブル後最安値に向けて下落継続。',
  '2002-3': '株価がバブル後最安値に向けて下落。日経平均が8,000円台まで落ち込み、銀行の自己資本が危機的に。',
  '2002-4': 'りそな銀行危機が表面化。公的資金注入が決定され、金融システム安定化への取り組みが加速。',

// Parse CSV
function parseData() {
  const rows = CSV.trim().split('\n');
  const events = [];
  rows.forEach((row, idx) => {
    const parts = row.split(',');
    const yearRaw = parts[0].trim();
    const evtRaw = parts[1].trim();
    const values = parts.slice(2).map(Number);
    let key, year, era;
    if (yearRaw === 'チュートリアル') {
      key = 'tutorial'; year = 0; era = 'tutorial';
    } else {
      year = parseInt(yearRaw);
      key = `${year}-${evtRaw}`;
      if (year >= 1970 && year <= 1979) era = '70';
      else if (year >= 1980 && year <= 1989) era = '80';
      else if (year >= 1990 && year <= 1999) era = '90';
      else if (year >= 2000 && year <= 2009) era = '00';
      else if (year >= 2010 && year <= 2019) era = '10';
      else era = '20';
    }
    const info = EVENT_MAP[key] || {date: yearRaw, name: key};
    events.push({key, year, evtRaw, era, values, info, idx});
  });
  return events;
}

const events = parseData();

// Find global max for bar scaling (exclude tutorial baseline)
let globalMax = 0;
events.forEach(e => {
  e.values.forEach((v, i) => {
    if (i !== 7 && v > globalMax) globalMax = v; // skip crypto for scale
  });
});
// Use a reasonable max for bar display
const BAR_MAX = globalMax;

function pct(val) {
  const p = ((val - 100000) / 100000 * 100);
  return (p >= 0 ? '+' : '') + p.toFixed(0) + '%';
}

function barWidth(val, assetIdx) {
  // For non-crypto, scale to BAR_MAX
  // For crypto, scale to max crypto value
  return Math.min(100, (val / BAR_MAX) * 100);
}

function buildLegend() {
  const legend = document.getElementById('legend');
  ASSET_KEYS.forEach((key, i) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${ASSET_COLORS[i]}"></div>${ASSET_ICONS[i]}${key}`;
    legend.appendChild(item);
  });
}

function buildCard(evt, prevEvt) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.era = evt.era;
  card.dataset.name = evt.info.name;
  card.dataset.key = evt.key;

  const isTutorial = evt.key === 'tutorial';
  const yearBadge = isTutorial ? 'START' : evt.year;
  const qBadge = isTutorial ? '' : ` Q${evt.evtRaw}`;

  let header = `<div class="card-header">
    <span class="year-badge">${yearBadge}${qBadge}</span>
    <span class="event-date">${evt.info.date}</span>
    <span class="event-name">${evt.info.name}</span>
    <a class="game-btn" href="calc.html">ゲームで確認</a>
  </div>`;

  const desc = DESCRIPTIONS[evt.key] || '';
  let descHtml = desc ? `<div class="desc">${desc}</div>` : '';

  // Build asset bars
  let barsHtml = '<div class="assets-grid">';
  evt.values.forEach((val, i) => {
    // Skip crypto if 0
    if (i === 7 && val === 0) return;
    const color = ASSET_COLORS[i];
    const bw = barWidth(val, i);
    const fromBase = pct(val);
    let chgHtml = '';
    if (prevEvt) {
      const prev = prevEvt.values[i];
      if (prev > 0 && val > 0) {
        const chg = ((val - prev) / prev * 100);
        const cls = chg > 0 ? 'chg-up' : chg < 0 ? 'chg-dn' : 'chg-eq';
        const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '―';
        chgHtml = `<span class="asset-chg ${cls}">${arrow}${Math.abs(chg).toFixed(0)}%</span>`;
      } else if (prev === 0 && val > 0) {
        chgHtml = `<span class="asset-chg chg-up">NEW</span>`;
      } else {
        chgHtml = `<span class="asset-chg chg-eq">―</span>`;
      }
    }
    barsHtml += `<div class="asset-row">
      <span class="asset-label" style="color:${color}">${ASSET_ICONS[i]}${ASSET_SHORT[i]}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${bw}%;background:${color}"></div></div>
      <span class="asset-pct">${fromBase}</span>
      ${chgHtml}
    </div>`;
  });
  barsHtml += '</div>';

  card.innerHTML = header + descHtml + barsHtml;
  return card;
}

function render(filter = 'all', search = '') {
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';

  const searchLower = search.toLowerCase();
  const sections = {};
  const ERA_LABELS = {
    'tutorial': 'チュートリアル',
    '70': '1970年代', '80': '1980年代', '90': '1990年代',
    '00': '2000年代', '10': '2010年代', '20': '2020年代'
  };
  const ERA_ORDER = ['tutorial','70','80','90','00','10','20'];

  let count = 0;
  events.forEach((evt, idx) => {
    if (filter !== 'all' && evt.era !== filter) return;
    if (search && !evt.info.name.toLowerCase().includes(searchLower) &&
        !(DESCRIPTIONS[evt.key] || '').toLowerCase().includes(searchLower)) return;
    const prevEvt = idx > 0 ? events[idx-1] : null;
    if (!sections[evt.era]) sections[evt.era] = [];
    sections[evt.era].push({evt, prevEvt});
    count++;
  });

  document.getElementById('resultCount').textContent = `${count}件のイベントを表示中`;

  ERA_ORDER.forEach(era => {
    if (!sections[era]) return;
    if (filter === 'all') {
      const sec = document.createElement('div');
      sec.className = 'era-section';
      sec.id = `era-${era}`;
      const h = document.createElement('div');
      h.className = 'era-heading';
      h.textContent = ERA_LABELS[era] || era;
      sec.appendChild(h);
      sections[era].forEach(({evt, prevEvt}) => {
        sec.appendChild(buildCard(evt, prevEvt));
      });
      container.appendChild(sec);
    } else {
      sections[era].forEach(({evt, prevEvt}) => {
        container.appendChild(buildCard(evt, prevEvt));
      });
    }
  });
}

// Tab click
document.getElementById('eraTabs').addEventListener('click', e => {
  const tab = e.target.closest('.era-tab');
  if (!tab) return;
  document.querySelectorAll('.era-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const era = tab.dataset.era;
  render(era, document.getElementById('searchInput').value.trim());
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const activeTab = document.querySelector('.era-tab.active');
    const era = activeTab ? activeTab.dataset.era : 'all';
    render(era, e.target.value.trim());
  }, 200);
});

buildLegend();
render();
</script>
</body>
</html>
